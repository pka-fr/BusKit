syntax = "proto3";

package buskit;

option csharp_namespace = "BusKit.Sidecar.Grpc";

// ─── Services ───────────────────────────────────────

service BusKitService {
  rpc Connect (ConnectRequest) returns (ConnectReply);
  rpc ConnectWithAzureAD (ConnectWithAzureADRequest) returns (ConnectReply);
  rpc Disconnect (DisconnectRequest) returns (DisconnectReply);
  rpc ListAzureSubscriptions (ListAzureSubscriptionsRequest) returns (ListAzureSubscriptionsReply);
  rpc SelectAzureTenant (SelectAzureTenantRequest) returns (SelectAzureTenantReply);
  rpc ListServiceBusNamespaces (ListServiceBusNamespacesRequest) returns (ListServiceBusNamespacesReply);
  rpc CheckRbacPermissions (CheckRbacPermissionsRequest) returns (CheckRbacPermissionsReply);
  rpc ListQueues (ListQueuesRequest) returns (ListQueuesReply);
  rpc ListTopics (ListTopicsRequest) returns (ListTopicsReply);
  rpc ListSubscriptions (ListSubscriptionsRequest) returns (ListSubscriptionsReply);
  rpc ListRules (ListRulesRequest) returns (ListRulesReply);
  rpc AddRule (AddRuleRequest) returns (AddRuleReply);
  rpc UpdateRule (UpdateRuleRequest) returns (UpdateRuleReply);
  rpc DeleteRule (DeleteRuleRequest) returns (DeleteRuleReply);
  rpc CreateQueue (CreateQueueRequest) returns (CreateQueueReply);
  rpc DeleteQueue (DeleteQueueRequest) returns (DeleteQueueReply);
  rpc SetQueueStatus (SetQueueStatusRequest) returns (SetQueueStatusReply);
  rpc SetTopicStatus (SetTopicStatusRequest) returns (SetTopicStatusReply);
  rpc CreateTopic (CreateTopicRequest) returns (CreateTopicReply);
  rpc DeleteTopic (DeleteTopicRequest) returns (DeleteTopicReply);
  rpc CreateSubscription (CreateSubscriptionRequest) returns (CreateSubscriptionReply);
  rpc DeleteSubscription (DeleteSubscriptionRequest) returns (DeleteSubscriptionReply);
  rpc GetQueueProperties (GetQueuePropertiesRequest) returns (GetQueuePropertiesReply);
  rpc GetTopicProperties (GetTopicPropertiesRequest) returns (GetTopicPropertiesReply);
  rpc GetTopicMetrics (GetTopicMetricsRequest) returns (GetTopicMetricsReply);
  rpc GetSubscriptionProperties (GetSubscriptionPropertiesRequest) returns (GetSubscriptionPropertiesReply);
  rpc UpdateSubscriptionTtl (UpdateSubscriptionTtlRequest) returns (UpdateSubscriptionTtlReply);
  rpc PurgeMessages (PurgeMessagesRequest) returns (PurgeMessagesReply);
  rpc PeekMessages (PeekMessagesRequest) returns (PeekMessagesReply);
  rpc SendMessage (SendMessageRequest) returns (SendMessageReply);
  rpc DeleteMessage (DeleteMessageRequest) returns (DeleteMessageReply);
  rpc SendMessageExtended (SendMessageExtendedRequest) returns (SendMessageReply);
  rpc SubscribeMessages (SubscribeRequest) returns (stream BusMessage);
}

// ─── Connection ─────────────────────────────────────

message ConnectRequest {
  string connection_string = 1;
}

message ConnectWithAzureADRequest {
  string fully_qualified_namespace = 1;
}

message ConnectReply {
  bool success = 1;
  string error = 2;
}

message DisconnectRequest {}
message DisconnectReply {
  bool success = 1;
}

// ─── Azure AD / RBAC ────────────────────────────────

message ListAzureSubscriptionsRequest {}

message ListAzureSubscriptionsReply {
  repeated AzureSubscriptionInfo subscriptions = 1;
  string error = 2;
  repeated AzureTenantInfo tenants = 3;
}

message AzureSubscriptionInfo {
  string subscription_id = 1;
  string display_name = 2;
}

message AzureTenantInfo {
  string tenant_id = 1;
  string display_name = 2;
}

message SelectAzureTenantRequest {
  string tenant_id = 1;
}

message SelectAzureTenantReply {
  repeated AzureSubscriptionInfo subscriptions = 1;
  string error = 2;
}

message ListServiceBusNamespacesRequest {
  string subscription_id = 1;
}

message ListServiceBusNamespacesReply {
  repeated ServiceBusNamespaceInfo namespaces = 1;
  string error = 2;
}

message ServiceBusNamespaceInfo {
  string name = 1;
  string fully_qualified_namespace = 2;
  string resource_group = 3;
}

// ─── RBAC Permission Check ───────────────────────────

enum AccessTier {
  ACCESS_TIER_NO_ACCESS        = 0;
  ACCESS_TIER_READ_ONLY        = 1;
  ACCESS_TIER_MESSAGE_READER   = 2;
  ACCESS_TIER_MESSAGE_OPERATOR = 3;
  ACCESS_TIER_FULL_ACCESS      = 4;
}

message CheckRbacPermissionsRequest {
  string subscription_id = 1;
  string resource_group = 2;
  string namespace_name = 3;
}

message CheckRbacPermissionsReply {
  // ── Legacy fields (kept for backward compatibility) ──────────────
  bool has_data_owner_role = 1;
  bool has_contributor_role = 2;
  string error = 3;
  bool check_failed = 4;

  // ── Tier classification ───────────────────────────────────────────
  AccessTier access_tier = 5;
  bool is_partial_access = 6;
  string tier_label = 7;

  // ── Capability map (per-action booleans) ─────────────────────────
  bool can_browse_entities   = 8;
  bool can_view_properties   = 9;
  bool can_peek_fetch        = 10;
  bool can_purge             = 11;
  bool can_resubmit_dlq      = 12;
  bool can_create_resources  = 13;
  bool can_manage_filters    = 14;

  // ── Upgrade recommendation ────────────────────────────────────────
  string recommended_role_name        = 15;
  string recommended_role_id          = 16;
  string recommended_role_description = 17;
  AccessTier recommended_target_tier  = 18;

  // ── Evaluation metadata ───────────────────────────────────────────
  int64 evaluated_at_unix_ms = 19;
  int64 expires_at_unix_ms   = 20;
}

// ─── Queues ─────────────────────────────────────────

message ListQueuesRequest {}

message ListQueuesReply {
  repeated QueueInfo queues = 1;
}

message QueueInfo {
  string name = 1;
  int64 message_count = 2;
  int64 dead_letter_count = 3;
  string status = 4;
}

// ─── Topics ─────────────────────────────────────────

message ListTopicsRequest {}

message ListTopicsReply {
  repeated TopicInfo topics = 1;
}

message TopicInfo {
  string name = 1;
  string status = 2;
}

// ─── Subscriptions ───────────────────────────────────

message ListSubscriptionsRequest {
  string topic_name = 1;
}

message ListSubscriptionsReply {
  repeated SubscriptionInfo subscriptions = 1;
}

message SubscriptionInfo {
  string name = 1;
  int64 active_message_count = 2;
  int64 dead_letter_count = 3;
}

// ─── Rules ───────────────────────────────────────────

message ListRulesRequest {
  string topic_name = 1;
  string subscription_name = 2;
}

message ListRulesReply {
  repeated RuleInfo rules = 1;
}

message RuleInfo {
  string name = 1;
  string filter = 2;
}

message UpdateRuleRequest {
  string topic_name = 1;
  string subscription_name = 2;
  string rule_name = 3;
  string sql_filter = 4;
}

message UpdateRuleReply {
  string error = 1;
}

message AddRuleRequest {
  string topic_name = 1;
  string subscription_name = 2;
  string rule_name = 3;
  string sql_filter = 4;
}

message AddRuleReply {
  string error = 1;
}

message DeleteRuleRequest {
  string topic_name = 1;
  string subscription_name = 2;
  string rule_name = 3;
}

message DeleteRuleReply {
  string error = 1;
}

// ─── Create Queue ─────────────────────────────────────

message CreateQueueRequest {
  string queue_name = 1;
  int64 max_size_mb = 2;
  int32 max_delivery_count = 3;
  int64 default_message_ttl_seconds = 4;
  int64 lock_duration_seconds = 5;
  bool requires_duplicate_detection = 6;
  bool requires_session = 7;
  bool dead_lettering_on_expiration = 8;
  bool enable_partitioning = 9;
  string forward_to = 10;
  int64 auto_delete_on_idle_seconds = 11;
}

message CreateQueueReply {
  string error = 1;
}

message DeleteQueueRequest {
  string queue_name = 1;
}

message DeleteQueueReply {
  string error = 1;
}

message SetQueueStatusRequest {
  string queue_name = 1;
  string status = 2;
}

message SetQueueStatusReply {
  string error = 1;
}

message SetTopicStatusRequest {
  string topic_name = 1;
  string status = 2;
}

message SetTopicStatusReply {
  string error = 1;
}

// ─── Create / Delete Topic ────────────────────────────

message CreateTopicRequest {
  string topic_name = 1;
  int64 max_size_mb = 2;
  int64 default_message_ttl_seconds = 3;
  bool requires_duplicate_detection = 4;
  bool enable_partitioning = 5;
  bool support_ordering = 6;
  int64 auto_delete_on_idle_seconds = 7;
}

message CreateTopicReply {
  string error = 1;
}

message DeleteTopicRequest {
  string topic_name = 1;
}

message DeleteTopicReply {
  string error = 1;
}

// ─── Create Subscription ─────────────────────────────

message CreateSubscriptionRequest {
  string topic_name = 1;
  string subscription_name = 2;
  int32 max_delivery_count = 3;
  int64 default_message_ttl_seconds = 4;
  int64 lock_duration_seconds = 5;
  int64 auto_delete_on_idle_seconds = 6;
  bool never_auto_delete = 7;
  bool enable_sessions = 8;
  bool dead_lettering_on_expiration = 9;
  bool dead_lettering_on_filter_evaluation = 10;
  bool forward_messages = 11;
  string forward_to = 12;
}

message CreateSubscriptionReply {
  string error = 1;
}

// ─── Delete Subscription ──────────────────────────────

message DeleteSubscriptionRequest {
  string topic_name = 1;
  string subscription_name = 2;
}

message DeleteSubscriptionReply {
  string error = 1;
}

// ─── Queue Properties ────────────────────────────────

message GetQueuePropertiesRequest {
  string name = 1;
}

message GetQueuePropertiesReply {
  QueueDetails properties = 1;
}

message QueueDetails {
  string name = 1;
  int64 max_size_mb = 2;
  int64 default_message_ttl_seconds = 3;
  int64 lock_duration_seconds = 4;
  bool requires_duplicate_detection = 5;
  bool requires_session = 6;
  int32 max_delivery_count = 7;
  bool dead_lettering_on_expiration = 8;
  string status = 9;
  int64 created_at_unix = 10;
  int64 updated_at_unix = 11;
  int64 active_message_count = 12;
  int64 dead_letter_count = 13;
  int64 size_bytes = 14;
  string forward_to = 15;
  int64 auto_delete_on_idle_seconds = 16;
}

// ─── Topic Properties ────────────────────────────────

message GetTopicPropertiesRequest {
  string name = 1;
}

message GetTopicPropertiesReply {
  TopicDetails properties = 1;
}

message TopicDetails {
  string name = 1;
  int64 max_size_mb = 2;
  int64 default_message_ttl_seconds = 3;
  bool requires_duplicate_detection = 4;
  bool support_ordering = 5;
  bool enable_partitioning = 6;
  string status = 7;
  int64 created_at_unix = 8;
  int64 updated_at_unix = 9;
  int64 scheduled_message_count = 10;
  int64 size_bytes = 11;
  int64 max_message_size_bytes = 12;
  int64 auto_delete_on_idle_seconds = 13;
  string user_metadata = 14;
}

// ─── Topic Metrics ───────────────────────────────────

message GetTopicMetricsRequest {
  string topic_name = 1;
  int32 hours = 2;
}

message MetricDataPoint {
  int64 timestamp_unix = 1;
  double value = 2;
}

message MetricSeries {
  string name = 1;
  repeated MetricDataPoint points = 2;
}

message GetTopicMetricsReply {
  repeated MetricSeries series = 1;
  string error = 2;
}

// ─── Subscription Properties ─────────────────────────

message GetSubscriptionPropertiesRequest {
  string topic_name = 1;
  string subscription_name = 2;
}

message GetSubscriptionPropertiesReply {
  SubscriptionDetails properties = 1;
}

message SubscriptionDetails {
  string topic_name = 1;
  string name = 2;
  int64 default_message_ttl_seconds = 3;
  int64 lock_duration_seconds = 4;
  int32 max_delivery_count = 5;
  bool dead_lettering_on_expiration = 6;
  bool dead_lettering_on_filter_evaluation = 7;
  string status = 8;
  int64 created_at_unix = 9;
  int64 updated_at_unix = 10;
  int64 active_message_count = 11;
  int64 dead_letter_count = 12;
  string forward_to = 13;
  int64 auto_delete_on_idle_seconds = 14;
}

// ─── Update Subscription TTL ─────────────────────────

message UpdateSubscriptionTtlRequest {
  string topic_name = 1;
  string subscription_name = 2;
  int64 default_message_ttl_seconds = 3;
}

message UpdateSubscriptionTtlReply {
  string error = 1;
}

// ─── Messages ───────────────────────────────────────

message PeekMessagesRequest {
  string queue_name = 1;
  int32 max_messages = 2;
  string topic_name = 3;
  string subscription_name = 4;
  bool dead_letter = 5;
}

message PeekMessagesReply {
  repeated BusMessage messages = 1;
}

message SendMessageRequest {
  string queue_name = 1;
  string body = 2;
  string content_type = 3;
  map<string, string> properties = 4;
}

message SendMessageReply {
  bool success = 1;
  string message_id = 2;
  string error = 3;
}

message SubscribeRequest {
  string queue_name = 1;
}

message PurgeMessagesRequest {
  string queue_name = 1;
  string topic_name = 2;
  string subscription_name = 3;
  bool dead_letter = 4;
}

message PurgeMessagesReply {
  int32 purged_count = 1;
}

message DeleteMessageRequest {
  string queue_name = 1;
  string topic_name = 2;
  string subscription_name = 3;
  bool dead_letter = 4;
  int64 sequence_number = 5;
}

message DeleteMessageReply {
  bool success = 1;
  string error = 2;
}

message SendMessageExtendedRequest {
  string queue_or_topic = 1;
  string body = 2;
  string content_type = 3;
  map<string, string> properties = 4;
  string subject = 5;
  string correlation_id = 6;
  string reply_to = 7;
  string to_address = 8;
  string session_id = 9;
  string partition_key = 10;
}

message BusMessage {
  string message_id = 1;
  string body = 2;
  string content_type = 3;
  int64 enqueued_time_unix = 4;
  map<string, string> properties = 5;
  int64 sequence_number = 6;
  int32 delivery_count = 7;
  int64 expires_at_unix = 8;
  string subject = 9;
  string correlation_id = 10;
  string reply_to = 11;
  string to_address = 12;
  string session_id = 13;
  string partition_key = 14;
}
